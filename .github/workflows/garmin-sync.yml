name: Garmin Sync

on:
  schedule:
    - cron: '0 * * * *'   # toda hora
  workflow_dispatch:        # botão manual no GitHub
    inputs:
      health_days:
        description: "Dias de saúde para sync manual (ex.: 21 rápido, 180 completo)"
        required: false
        default: "21"

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.repository == 'LuizKatiu62/gastos-casa'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install garminconnect

      - name: Rodar sync Garmin → Firebase
        run: python sync-garmin-auto.py
        env:
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          DIAS_SAUDE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.health_days || '180' }}
