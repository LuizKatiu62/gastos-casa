<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d47a1">
<title>Gastos da Casa</title>
<style>
body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#1a1a2e;padding-bottom:80px}
/* HEADER */
.hdr{background:linear-gradient(135deg,#0d47a1,#1565c0);color:#fff;padding:16px}
.hdr h1{font-size:1.1rem;font-weight:800;margin:0 0 12px}
/* SETUP CARD */
.setup{background:rgba(255,255,255,0.13);border-radius:14px;padding:14px;margin-bottom:10px}
.setup-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.setup-row:last-child{margin-bottom:0}
.setup-lbl{font-size:.72rem;font-weight:700;opacity:.75;min-width:70px;text-transform:uppercase}
.setup input,.setup select{flex:1;background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.35);border-radius:9px;padding:8px 10px;color:#fff;font-size:.95rem;font-weight:600;font-family:inherit;-webkit-appearance:none;appearance:none}
.setup input::placeholder{color:rgba(255,255,255,0.5)}
.setup select option{color:#1a1a2e;background:#fff}
.setup input:focus,.setup select:focus{outline:none;border-color:#fff;background:rgba(255,255,255,0.28)}
.btn-save{background:#fff;color:#0d47a1;border:none;border-radius:9px;padding:8px 16px;font-weight:800;font-size:.85rem;cursor:pointer;white-space:nowrap}
/* BUDGET DISPLAY */
.bcard{background:rgba(255,255,255,0.12);border-radius:14px;padding:14px}
.brow{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8px}
.bspent{font-size:1.9rem;font-weight:900;line-height:1}
.blbl{font-size:.65rem;opacity:.65;margin-bottom:3px;text-transform:uppercase}
.bval{font-size:.95rem;font-weight:700}
.brem{font-size:.8rem;font-weight:600;margin-top:2px}
.pbar{height:8px;background:rgba(255,255,255,.2);border-radius:4px;overflow:hidden}
.pfill{height:100%;border-radius:4px;transition:width .5s,background .3s}
.pmeta{display:flex;justify-content:space-between;margin-top:5px;font-size:.68rem;opacity:.65}
/* ALERT */
.alert{border-radius:12px;padding:12px 14px;font-size:.84rem;font-weight:600;align-items:center;gap:8px;margin:12px 0 0;display:none}
.alert.warn{display:flex;background:#fff3e0;border:1.5px solid #ff9800;color:#e65100}
.alert.danger{display:flex;background:#ffebee;border:1.5px solid #f44336;color:#b71c1c}
/* CONTENT */
.content{padding:0 14px;margin-top:-12px}
/* CARDS */
.card{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:16px;margin-bottom:12px}
.ctitle{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#888;margin-bottom:12px}
/* CAT GRID */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
.ccat{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:14px;border-left:4px solid;cursor:pointer}
.ccat.car{border-color:#e53935}.ccat.misc{border-color:#fb8c00}.ccat.mkt{border-color:#43a047;grid-column:1/-1}
.cicon{font-size:1.4rem;margin-bottom:5px}
.cname{font-size:.68rem;font-weight:700;text-transform:uppercase;color:#888;margin-bottom:2px}
.camt{font-size:1.2rem;font-weight:800}
.ccnt{font-size:.68rem;color:#aaa;margin-top:2px}
/* CHARTS */
.ch180{height:180px;max-width:320px;margin:0 auto;position:relative}
.ch150{height:150px;position:relative}
/* ENTRIES */
.eitem{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f2f2f2;gap:10px}
.eitem:last-child{border-bottom:none}
.edot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.einfo{flex:1;min-width:0}
.edesc{font-size:.84rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.emeta{font-size:.7rem;color:#aaa;margin-top:1px}
.eamt{font-size:.88rem;font-weight:700;flex-shrink:0}
.edel{background:none;border:none;color:#ccc;font-size:.95rem;cursor:pointer;padding:4px}
.empty{text-align:center;padding:24px 12px;color:#aaa;font-size:.9rem}
/* FAB */
.fab{position:fixed;bottom:86px;right:20px;width:58px;height:58px;border-radius:50%;background:#1565c0;color:#fff;border:none;font-size:2rem;box-shadow:0 4px 18px rgba(21,101,192,.45);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:100}
/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;display:flex;z-index:99;padding-bottom:env(safe-area-inset-bottom,0)}
.nbtn{flex:1;border:none;background:none;padding:10px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.62rem;color:#bbb;cursor:pointer}
.nbtn.on{color:#1565c0}
.nbtn .ni{font-size:1.2rem}
/* SCREENS */
.scr{display:none}.scr.on{display:block}
/* MONTH SEL */
.msel{display:flex;align-items:center;justify-content:center;gap:10px;padding:8px 0}
.mnav{background:none;border:1.5px solid #e0e0e0;border-radius:50%;width:32px;height:32px;font-size:1rem;cursor:pointer}
/* ADD FORM */
.form-card{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:16px;margin-bottom:12px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:.75rem;font-weight:700;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select,.fg textarea{width:100%;border:1.5px solid #e0e0e0;border-radius:11px;padding:12px 13px;font-size:1rem;font-family:inherit;color:#1a1a2e;background:#fff;box-sizing:border-box}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#1565c0}
.fg textarea{resize:none;height:70px}
.drow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
/* CAT BTNS */
.cbg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.cbtn{border:2px solid #e0e0e0;border-radius:12px;padding:10px 4px;text-align:center;cursor:pointer;background:#fafafa}
.cbtn .ci{font-size:1.3rem;margin-bottom:3px}
.cbtn .cn{font-size:.68rem;font-weight:700;color:#888}
.cbtn.on-car{border-color:#e53935;background:#fff5f5}.cbtn.on-car .cn{color:#e53935}
.cbtn.on-misc{border-color:#fb8c00;background:#fff8f0}.cbtn.on-misc .cn{color:#fb8c00}
.cbtn.on-mkt{border-color:#43a047;background:#f1f8e9}.cbtn.on-mkt .cn{color:#43a047}
/* SUBCATS */
.sbg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.sbtn{border:1.5px solid #e0e0e0;border-radius:10px;padding:9px 4px;font-size:.72rem;font-weight:700;background:#fafafa;cursor:pointer;color:#888}
.sbtn.on{border-color:#e53935;background:#fff5f5;color:#e53935}
/* AMOUNT */
.amtw{position:relative}
.amtw::before{content:'$';position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:1rem;font-weight:700;color:#888}
.amtw input{padding-left:26px;font-size:1.3rem;font-weight:700}
/* BUTTONS */
.btnp{width:100%;background:#1565c0;color:#fff;border:none;border-radius:13px;padding:14px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:4px}
.btnw{background:#25D366;color:#fff;border:none;border-radius:13px;padding:13px;font-size:.9rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;width:100%;margin-top:10px}
/* SUMMARY */
.srow{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f2f2f2;font-size:.88rem}
.srow:last-child{border-bottom:none}
/* TOAST */
.toast{position:fixed;top:16px;left:14px;right:14px;background:#1a1a2e;color:#fff;border-radius:13px;padding:13px 15px;font-size:.87rem;font-weight:500;z-index:999;transform:translateY(-120px);opacity:0;transition:all .3s;display:flex;align-items:center;gap:9px;pointer-events:none}
.toast.on{transform:translateY(0);opacity:1}
</style>
</head>
<body>

<div class="toast" id="toast"><span id="ti"></span><span id="tm"></span></div>

<!-- ═══ INÍCIO ═══ -->
<div class="scr on" id="s-home">
  <div class="hdr">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h1>💳 Gastos da Casa</h1>
      <button class="ibtn" onclick="shareWA()" style="background:rgba(255,255,255,.15);border:none;color:#fff;width:38px;height:38px;border-radius:50%;font-size:1.1rem;cursor:pointer">📲</button>
    </div>

    <!-- SETUP: campos sempre visíveis -->
    <div class="setup">
      <div class="setup-row">
        <span class="setup-lbl">💰 Limite</span>
        <input type="number" id="cfg-lim" placeholder="Ex: 3000" inputmode="decimal" step="0.01" onchange="saveCfg()">
        <input type="number" id="cfg-pct" placeholder="% alerta" inputmode="numeric" min="1" max="100" style="max-width:80px" onchange="saveCfg()">
        <button class="btn-save" onclick="saveCfg()">OK</button>
      </div>
      <div class="setup-row">
        <span class="setup-lbl">📅 Período</span>
        <select id="ps-day" onchange="savePeriod()"></select>
        <select id="ps-mon" onchange="savePeriod()">
          <option value="01">Jan</option><option value="02">Fev</option><option value="03">Mar</option><option value="04">Abr</option><option value="05">Mai</option><option value="06">Jun</option><option value="07">Jul</option><option value="08">Ago</option><option value="09">Set</option><option value="10">Out</option><option value="11">Nov</option><option value="12">Dez</option>
        </select>
        <select id="ps-yr" onchange="savePeriod()"></select>
        <span style="opacity:.7;font-size:.8rem">→</span>
        <select id="pe-day" onchange="savePeriod()"></select>
        <select id="pe-mon" onchange="savePeriod()">
          <option value="01">Jan</option><option value="02">Fev</option><option value="03">Mar</option><option value="04">Abr</option><option value="05">Mai</option><option value="06">Jun</option><option value="07">Jul</option><option value="08">Ago</option><option value="09">Set</option><option value="10">Out</option><option value="11">Nov</option><option value="12">Dez</option>
        </select>
        <select id="pe-yr" onchange="savePeriod()"></select>
      </div>
    </div>

    <!-- TOTAIS -->
    <div class="bcard">
      <div class="brow">
        <div>
          <div class="blbl">Total Gasto</div>
          <div class="bspent" id="b-spent">$0.00</div>
        </div>
        <div style="text-align:right">
          <div class="blbl">Disponível</div>
          <div class="bval" id="b-limit">$0.00</div>
          <div class="brem" id="b-rem"></div>
        </div>
      </div>
      <div class="pbar"><div class="pfill" id="pfill" style="width:0%"></div></div>
      <div class="pmeta">
        <span id="ppct">0%</span>
        <span id="ptoday">Hoje: $0.00</span>
      </div>
    </div>

    <div class="alert" id="alert"><span id="alert-ic"></span><span id="alert-msg"></span></div>
  </div>

  <div class="content">
    <div class="cgrid">
      <div class="ccat car" onclick="showCat('car')"><div class="cicon">🚗</div><div class="cname">Carro</div><div class="camt" id="t-car">$0.00</div><div class="ccnt" id="c-car">0</div></div>
      <div class="ccat misc" onclick="showCat('misc')"><div class="cicon">🛍️</div><div class="cname">Diversos</div><div class="camt" id="t-misc">$0.00</div><div class="ccnt" id="c-misc">0</div></div>
      <div class="ccat mkt" onclick="showCat('mkt')"><div class="cicon">🛒</div><div class="cname">Supermercado</div><div class="camt" id="t-mkt">$0.00</div><div class="ccnt" id="c-mkt">0</div></div>
    </div>
    <div class="card"><div class="ctitle">Distribuição</div><div class="ch180"><canvas id="donut"></canvas></div></div>
    <div class="card"><div class="ctitle">Gastos Diários</div><div class="ch150"><canvas id="bars"></canvas></div></div>
    <div class="card"><div class="ctitle">Recentes</div><div id="recent"></div></div>
  </div>
</div>

<!-- ═══ ADICIONAR ═══ -->
<div class="scr" id="s-add">
  <div class="hdr" style="padding-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h1 style="margin:0">➕ Novo Lançamento</h1>
      <button onclick="go('home')" style="background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:50%;width:36px;height:36px;font-size:1.1rem;cursor:pointer">✕</button>
    </div>
  </div>
  <div style="padding:14px">
    <div class="form-card">
      <div class="fg">
        <label>Categoria</label>
        <div class="cbg">
          <div class="cbtn" id="cb-car" onclick="selCat('car')"><div class="ci">🚗</div><div class="cn">Carro</div></div>
          <div class="cbtn" id="cb-misc" onclick="selCat('misc')"><div class="ci">🛍️</div><div class="cn">Diversos</div></div>
          <div class="cbtn" id="cb-mkt" onclick="selCat('mkt')"><div class="ci">🛒</div><div class="cn">Mercado</div></div>
        </div>
      </div>
      <div class="fg" id="sub-grp" style="display:none">
        <label>Subcategoria — Carro</label>
        <div class="sbg">
          <button class="sbtn" id="sb-gas" onclick="selSub('gas')">⛽ Gasolina</button>
          <button class="sbtn" id="sb-oil" onclick="selSub('oil')">🛢️ Óleo</button>
          <button class="sbtn" id="sb-div" onclick="selSub('div')">🔧 Diversos</button>
        </div>
      </div>
      <div class="fg">
        <label>Valor ($)</label>
        <div class="amtw"><input type="number" id="e-amt" placeholder="0.00" step="0.01" min="0" inputmode="decimal"></div>
      </div>
      <div class="fg">
        <label>Data</label>
        <div class="drow">
          <select id="e-day"></select>
          <select id="e-mon">
            <option value="01">Janeiro</option><option value="02">Fevereiro</option><option value="03">Março</option><option value="04">Abril</option><option value="05">Maio</option><option value="06">Junho</option><option value="07">Julho</option><option value="08">Agosto</option><option value="09">Setembro</option><option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
          </select>
          <select id="e-yr"></select>
        </div>
      </div>
      <div class="fg">
        <label>Descrição (opcional)</label>
        <textarea id="e-desc" placeholder="Ex: Gasolina Petro-Canada…"></textarea>
      </div>
      <button class="btnp" onclick="saveEntry()">💾 Salvar Lançamento</button>
    </div>
  </div>
</div>

<!-- ═══ HISTÓRICO ═══ -->
<div class="scr" id="s-hist">
  <div class="hdr" style="padding-bottom:16px"><h1 style="margin:0">📋 Histórico</h1></div>
  <div style="padding:14px">
    <div class="card" style="padding:8px 14px">
      <div class="msel">
        <button class="mnav" onclick="histDelta(-1)">‹</button>
        <span style="font-weight:700;min-width:140px;text-align:center" id="hist-lbl">—</span>
        <button class="mnav" onclick="histDelta(1)">›</button>
      </div>
    </div>
    <div id="hist-body"></div>
  </div>
</div>

<!-- ═══ RELATÓRIO ═══ -->
<div class="scr" id="s-rep">
  <div class="hdr" style="padding-bottom:16px"><h1 style="margin:0">📊 Relatório</h1></div>
  <div style="padding:14px">
    <div class="card" style="padding:8px 14px">
      <div class="msel">
        <button class="mnav" onclick="repDelta(-1)">‹</button>
        <span style="font-weight:700;min-width:140px;text-align:center" id="rep-lbl">—</span>
        <button class="mnav" onclick="repDelta(1)">›</button>
      </div>
    </div>
    <div id="rep-body"></div>
  </div>
</div>

<!-- ═══ DETALHE CATEGORIA (tela) ═══ -->
<div class="scr" id="s-cat">
  <div class="hdr" style="padding-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h1 id="cat-title" style="margin:0">Categoria</h1>
      <button onclick="go('home')" style="background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:50%;width:36px;height:36px;font-size:1.1rem;cursor:pointer">✕</button>
    </div>
  </div>
  <div style="padding:14px"><div id="cat-body"></div></div>
</div>

<nav class="bnav">
  <button class="nbtn on" id="n-home" onclick="go('home')"><span class="ni">🏠</span><span>Início</span></button>
  <button class="nbtn" id="n-add" onclick="go('add')"><span class="ni">➕</span><span>Adicionar</span></button>
  <button class="nbtn" id="n-hist" onclick="go('hist')"><span class="ni">📋</span><span>Histórico</span></button>
  <button class="nbtn" id="n-rep" onclick="go('rep')"><span class="ni">📊</span><span>Relatório</span></button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
const WA='14379718925';
const CATS={car:'Carro',misc:'Diversos',mkt:'Supermercado'};
const CCOL={car:'#e53935',misc:'#fb8c00',mkt:'#43a047'};
const SUBS={gas:'⛽ Gasolina',oil:'🛢️ Óleo',div:'🔧 Diversos'};

function ld(){try{return JSON.parse(localStorage.getItem('gd')||'{}')}catch(e){return{}}}
function sd(d){localStorage.setItem('gd',JSON.stringify(d))}
function gd(){
  const d=ld();
  if(!d.entries)d.entries=[];
  if(!d.limit)d.limit=0;
  if(!d.alertPct)d.alertPct=80;
  if(!d.period){
    const n=new Date(),y=n.getFullYear(),m=String(n.getMonth()+1).padStart(2,'0');
    const last=new Date(y,n.getMonth()+1,0).getDate();
    d.period={start:`${y}-${m}-01`,end:`${y}-${m}-${String(last).padStart(2,'0')}`};
  }
  return d;
}
function fmt(n){return '$'+(+n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',')}
function fdate(s){if(!s)return'';const[y,m,d]=s.split('-');return`${d}/${m}/${y}`}
function today(){return new Date().toISOString().split('T')[0]}
function curMo(){const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`}
function moLabel(k){const[y,m]=k.split('-');return['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][+m-1]+' '+y}
function pEntries(entries,p){return entries.filter(e=>e.date&&e.date>=p.start&&e.date<=p.end)}
function mEntries(entries,mo){return entries.filter(e=>e.date&&e.date.startsWith(mo))}

// Date selects helpers
function fillDays(id,n){const s=document.getElementById(id),v=s.value;s.innerHTML='';for(let i=1;i<=n;i++){const o=document.createElement('option');o.value=String(i).padStart(2,'0');o.textContent=String(i).padStart(2,'0');s.appendChild(o)}if(v&&+v<=n)s.value=v}
function fillYears(id,y){const s=document.getElementById(id);s.innerHTML='';for(let i=y-1;i<=y+2;i++){const o=document.createElement('option');o.value=String(i);o.textContent=String(i);s.appendChild(o)}s.value=String(y)}
function setDate(dayId,monId,yrId,str){const[y,m,d]=str.split('-');fillDays(dayId,new Date(+y,+m,0).getDate());fillYears(yrId,+y);document.getElementById(dayId).value=d;document.getElementById(monId).value=m;document.getElementById(yrId).value=y}
function getDate(dayId,monId,yrId){return`${document.getElementById(yrId).value}-${document.getElementById(monId).value}-${document.getElementById(dayId).value}`}

let _cat='car',_sub='gas',_hmo=curMo(),_rmo=curMo(),_dc=null,_bc=null;

// RENDER
function render(){
  const d=gd(),p=d.period,es=pEntries(d.entries,p);
  const tots={car:0,misc:0,mkt:0},cnts={car:0,misc:0,mkt:0};
  let total=0;
  es.forEach(e=>{tots[e.cat]=(tots[e.cat]||0)++(e.amt||0);cnts[e.cat]=(cnts[e.cat]||0)+1;total+=+(e.amt||0)});
  const td=today(),tdT=es.filter(e=>e.date===td).reduce((s,e)=>s+(+(e.amt||0)),0);
  document.getElementById('b-spent').textContent=fmt(total);
  document.getElementById('b-limit').textContent=fmt(d.limit);
  const rem=d.limit-total;
  document.getElementById('b-rem').textContent=(rem>=0?fmt(rem):'-'+fmt(-rem))+' restante';
  document.getElementById('b-rem').style.color=rem<0?'#ff6b6b':'rgba(255,255,255,.85)';
  document.getElementById('ptoday').textContent='Hoje: '+fmt(tdT);
  const pct=d.limit>0?Math.min(total/d.limit*100,100):0;
  const over=total>d.limit&&d.limit>0;
  document.getElementById('pfill').style.width=pct+'%';
  document.getElementById('pfill').style.background=over?'#f44336':pct>=(d.alertPct||80)?'#ff9800':'#69f0ae';
  document.getElementById('ppct').textContent=pct.toFixed(1)+'% utilizado';
  // alert
  const al=document.getElementById('alert');
  if(over){al.className='alert danger';document.getElementById('alert-ic').textContent='🚨';document.getElementById('alert-msg').textContent=`LIMITE EXCEDIDO! ${fmt(total-d.limit)} além do limite.`}
  else if(pct>=(d.alertPct||80)&&d.limit>0){al.className='alert warn';document.getElementById('alert-ic').textContent='⚠️';document.getElementById('alert-msg').textContent=`Atenção: ${pct.toFixed(0)}% utilizado. Restam ${fmt(rem)}.`}
  else al.className='alert';
  // cats
  ['car','misc','mkt'].forEach(c=>{
    document.getElementById('t-'+c).textContent=fmt(tots[c]||0);
    document.getElementById('c-'+c).textContent=(cnts[c]||0)+' lançamento'+(cnts[c]!==1?'s':'');
  });
  renderDonut(tots);renderBars(es,p);renderRecent(d.entries);
}

function renderDonut(tots){
  const ctx=document.getElementById('donut').getContext('2d');
  const vs=[tots.car||0,tots.misc||0,tots.mkt||0],has=vs.some(v=>v>0);
  if(_dc)_dc.destroy();
  _dc=new Chart(ctx,{type:'doughnut',data:{labels:['🚗 Carro','🛍️ Diversos','🛒 Supermercado'],datasets:[{data:has?vs:[1,1,1],backgroundColor:has?['#e53935','#fb8c00','#43a047']:['#eee','#e8e8e8','#e0e0e0'],borderWidth:0,hoverOffset:6}]},options:{cutout:'68%',plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:10,boxWidth:13}},tooltip:{callbacks:{label:c=>` ${c.label}: ${fmt(c.raw)}`}}}}});
}

function renderBars(es,p){
  const ctx=document.getElementById('bars').getContext('2d');
  const dt={};es.forEach(e=>{dt[e.date]=(dt[e.date]||0)+(+(e.amt||0))});
  const lbs=[],vs=[],cs=[],td=today();
  let cur=new Date(p.start+'T00:00:00'),end=new Date(p.end+'T00:00:00');
  while(cur<=end&&cur.toISOString().split('T')[0]<=td){
    const ds=cur.toISOString().split('T')[0];
    lbs.push(cur.getDate()+'/'+(cur.getMonth()+1));vs.push(dt[ds]||0);cs.push(dt[ds]>0?'#1565c0':'#e8eaf6');
    cur.setDate(cur.getDate()+1);
  }
  if(_bc)_bc.destroy();
  _bc=new Chart(ctx,{type:'bar',data:{labels:lbs,datasets:[{data:vs,backgroundColor:cs,borderRadius:4,barPercentage:.72}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${fmt(c.raw)}`}}},scales:{x:{grid:{display:false},ticks:{font:{size:9},maxRotation:45}},y:{grid:{color:'#f0f0f0'},ticks:{font:{size:9},callback:v=>'$'+v}}}}});
}

function renderRecent(all){
  const rec=[...all].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8);
  const el=document.getElementById('recent');
  if(!rec.length){el.innerHTML='<div class="empty">📭 Nenhum lançamento ainda</div>';return}
  el.innerHTML=rec.map(e=>`<div class="eitem"><div class="edot" style="background:${CCOL[e.cat]}"></div><div class="einfo"><div class="edesc">${e.desc||CATS[e.cat]}</div><div class="emeta">${fdate(e.date)} · ${CATS[e.cat]}${e.sub?' · '+SUBS[e.sub]:''}</div></div><div class="eamt" style="color:${CCOL[e.cat]}">${fmt(e.amt)}</div><button class="edel" onclick="delE('${e.id}')">✕</button></div>`).join('');
}

// HISTORY
function renderHist(){
  const d=gd(),es=mEntries(d.entries,_hmo).sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('hist-lbl').textContent=moLabel(_hmo);
  const el=document.getElementById('hist-body');
  if(!es.length){el.innerHTML='<div class="card"><div class="empty">📭 Sem lançamentos neste mês</div></div>';return}
  const byDay={};es.forEach(e=>{if(!byDay[e.date])byDay[e.date]=[];byDay[e.date].push(e)});
  el.innerHTML=Object.keys(byDay).sort((a,b)=>b.localeCompare(a)).map(date=>{
    const dt=byDay[date].reduce((s,e)=>s+(+(e.amt||0)),0);
    return`<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><b>${fdate(date)}</b><b style="color:#1565c0">${fmt(dt)}</b></div>${byDay[date].map(e=>`<div class="eitem"><div class="edot" style="background:${CCOL[e.cat]}"></div><div class="einfo"><div class="edesc">${e.desc||CATS[e.cat]}</div><div class="emeta">${CATS[e.cat]}${e.sub?' · '+SUBS[e.sub]:''}</div></div><div class="eamt" style="color:${CCOL[e.cat]}">${fmt(e.amt)}</div><button class="edel" onclick="delE('${e.id}')">✕</button></div>`).join('')}</div>`;
  }).join('');
}
function histDelta(n){const[y,m]=_hmo.split('-').map(Number);const dt=new Date(y,m-1+n,1);_hmo=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;renderHist()}

// REPORT
function renderRep(){
  const d=gd(),es=mEntries(d.entries,_rmo);
  document.getElementById('rep-lbl').textContent=moLabel(_rmo);
  const tots={car:0,misc:0,mkt:0},stots={};let grand=0;
  es.forEach(e=>{const a=+(e.amt||0);tots[e.cat]=(tots[e.cat]||0)+a;grand+=a;if(e.sub)stots[e.sub]=(stots[e.sub]||0)+a});
  const pct=d.limit>0?(grand/d.limit*100):0,rem=d.limit-grand;
  document.getElementById('rep-body').innerHTML=`<div class="card">
    <div class="ctitle">Resumo — ${moLabel(_rmo)}</div>
    <div class="srow"><span style="color:#888">Total Gasto</span><b style="color:#1565c0">${fmt(grand)}</b></div>
    <div class="srow"><span style="color:#888">Limite</span><b>${fmt(d.limit)}</b></div>
    <div class="srow"><span style="color:#888">Utilização</span><b style="color:${pct>100?'#f44336':pct>=80?'#ff9800':'#43a047'}">${pct.toFixed(1)}%</b></div>
    <div class="srow"><span style="color:#888">Disponível</span><b style="color:${rem<0?'#f44336':'#43a047'}">${fmt(rem)}</b></div>
    <hr style="border:none;border-top:1px solid #f2f2f2;margin:6px 0">
    <div class="srow"><span style="color:#888">🚗 Carro</span><b style="color:#e53935">${fmt(tots.car)}</b></div>
    <div class="srow"><span style="color:#888">🛍️ Diversos</span><b style="color:#fb8c00">${fmt(tots.misc)}</b></div>
    <div class="srow"><span style="color:#888">🛒 Supermercado</span><b style="color:#43a047">${fmt(tots.mkt)}</b></div>
    ${tots.car>0?`<hr style="border:none;border-top:1px solid #f2f2f2;margin:6px 0"><div class="ctitle" style="margin-top:8px">🚗 Carro — Detalhes</div>${['gas','oil','div'].filter(s=>stots[s]).map(s=>`<div class="srow"><span style="color:#888">${SUBS[s]}</span><b style="color:#e53935">${fmt(stots[s])}</b></div>`).join('')}`:''}
    <button class="btnw" onclick="shareWA()"><span>📱</span>Enviar por WhatsApp</button>
    <div style="margin-top:10px"><button onclick="if(confirm('Apagar TODOS os dados?')){localStorage.removeItem('gd');location.reload()}" style="width:100%;background:none;border:1.5px solid #ffcdd2;color:#c62828;border-radius:11px;padding:11px;font-size:.85rem;font-weight:700;cursor:pointer">🗑️ Apagar todos os dados</button></div>
  </div>`;
}
function repDelta(n){const[y,m]=_rmo.split('-').map(Number);const dt=new Date(y,m-1+n,1);_rmo=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;renderRep()}

// CAT DETAIL
function showCat(cat){
  const d=gd(),p=d.period,es=pEntries(d.entries,p).filter(e=>e.cat===cat).sort((a,b)=>b.date.localeCompare(a.date));
  const tot=es.reduce((s,e)=>s+(+(e.amt||0)),0);
  document.getElementById('cat-title').textContent={car:'🚗 Carro',misc:'🛍️ Diversos',mkt:'🛒 Supermercado'}[cat];
  document.getElementById('cat-body').innerHTML=!es.length?'<div class="card"><div class="empty">📭 Sem lançamentos no período</div></div>':`
    <div class="card" style="text-align:center;padding:12px 16px 16px">
      <div style="font-size:.7rem;color:#888;margin-bottom:4px">TOTAL DO PERÍODO</div>
      <div style="font-size:2rem;font-weight:900;color:${CCOL[cat]}">${fmt(tot)}</div>
    </div>
    <div class="card">${es.map(e=>`<div class="eitem"><div class="edot" style="background:${CCOL[cat]}"></div><div class="einfo"><div class="edesc">${e.desc||CATS[e.cat]}</div><div class="emeta">${fdate(e.date)}${e.sub?' · '+SUBS[e.sub]:''}</div></div><div class="eamt" style="color:${CCOL[cat]}">${fmt(e.amt)}</div><button class="edel" onclick="delE('${e.id}');showCat('${cat}')">✕</button></div>`).join('')}</div>`;
  go('cat');
}

// ADD
function selCat(c){
  _cat=c;
  ['car','misc','mkt'].forEach(k=>{document.getElementById('cb-'+k).className='cbtn'+(k===c?' on-'+k:'')});
  document.getElementById('sub-grp').style.display=c==='car'?'block':'none';
}
function selSub(s){
  _sub=s;
  ['gas','oil','div'].forEach(k=>{document.getElementById('sb-'+k).className='sbtn'+(k===s?' on':'')});
}
function saveEntry(){
  const amt=parseFloat(document.getElementById('e-amt').value);
  const date=getDate('e-day','e-mon','e-yr');
  if(!amt||amt<=0){toast('⚠️','Informe um valor válido');return}
  const d=gd();
  d.entries.push({id:Date.now().toString(),cat:_cat,sub:_cat==='car'?_sub:null,amt,date,desc:document.getElementById('e-desc').value.trim()});
  sd(d);go('home');render();toast('✅','Lançamento salvo!');checkAlert();
}
function delE(id){
  if(!confirm('Excluir?'))return;
  const d=gd();d.entries=d.entries.filter(e=>e.id!==id);sd(d);render();renderHist();renderRep();toast('🗑️','Excluído');
}

// CONFIG — auto-save on change
function saveCfg(){
  const lim=parseFloat(document.getElementById('cfg-lim').value);
  const pct=parseInt(document.getElementById('cfg-pct').value)||80;
  if(!lim||lim<=0)return;
  const d=gd();d.limit=lim;d.alertPct=pct;sd(d);render();toast('✅','Limite salvo!');
}
function savePeriod(){
  const s=getDate('ps-day','ps-mon','ps-yr'),e=getDate('pe-day','pe-mon','pe-yr');
  if(s>e){toast('⚠️','Início deve ser antes do fim');return}
  const d=gd();d.period={start:s,end:e};sd(d);render();
}

// WHATSAPP
function shareWA(){
  const d=gd(),p=d.period,es=pEntries(d.entries,p);
  const tots={car:0,misc:0,mkt:0};let g=0;
  es.forEach(e=>{tots[e.cat]=(tots[e.cat]||0)+(+(e.amt||0));g+=+(e.amt||0)});
  const pct=d.limit>0?(g/d.limit*100).toFixed(1):'—',rem=d.limit-g;
  const td=today(),tde=es.filter(e=>e.date===td),tdT=tde.reduce((s,e)=>s+(+(e.amt||0)),0);
  let msg=`💳 *GASTOS DA CASA*\n📅 ${fdate(p.start)} → ${fdate(p.end)}\n━━━━━━━━━━━━━━━━\n`;
  msg+=`📊 Total: *${fmt(g)}*\n📈 Limite: ${fmt(d.limit)} (${pct}%)\n💰 Disponível: *${fmt(rem)}*\n\n`;
  msg+=`🚗 Carro: ${fmt(tots.car)}\n🛍️ Diversos: ${fmt(tots.misc)}\n🛒 Supermercado: ${fmt(tots.mkt)}`;
  if(tdT>0){msg+=`\n\n📅 *Hoje:* ${fmt(tdT)}\n`;tde.forEach(e=>{msg+=`  • ${e.desc||CATS[e.cat]}: ${fmt(e.amt)}\n`})}
  if(g>d.limit)msg+=`\n🚨 *LIMITE EXCEDIDO em ${fmt(g-d.limit)}!*`;
  msg+=`\n_Enviado via Gastos da Casa_`;
  window.open(`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`, '_blank');
}

function checkAlert(){
  const d=gd(),p=d.period,es=pEntries(d.entries,p),g=es.reduce((s,e)=>s+(+(e.amt||0)),0),pct=d.limit>0?g/d.limit*100:0;
  if(g>d.limit)toast('🚨',`Limite EXCEDIDO! ${fmt(g)} / ${fmt(d.limit)}`);
  else if(pct>=(d.alertPct||80))toast('⚠️',`${pct.toFixed(0)}% do limite atingido!`);
}

// NAV
function go(name){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nbtn').forEach(b=>b.classList.remove('on'));
  document.getElementById('s-'+name).classList.add('on');
  const nb=document.getElementById('n-'+name);
  if(nb)nb.classList.add('on');
  if(name==='hist')renderHist();
  if(name==='rep')renderRep();
  if(name==='add'){
    selCat('car');selSub('gas');
    document.getElementById('e-amt').value='';
    document.getElementById('e-desc').value='';
    const n=new Date();fillDays('e-day',new Date(n.getFullYear(),n.getMonth()+1,0).getDate());fillYears('e-yr',n.getFullYear());
    setDate('e-day','e-mon','e-yr',today());
  }
  window.scrollTo(0,0);
}

let _tt=null;
function toast(ic,msg){
  const t=document.getElementById('toast');
  document.getElementById('ti').textContent=ic;document.getElementById('tm').textContent=msg;
  t.classList.add('on');if(_tt)clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('on'),3000);
}

// INIT
window.addEventListener('DOMContentLoaded',()=>{
  const d=gd(),n=new Date(),y=n.getFullYear();
  // Fill period selects
  fillDays('ps-day',31);fillYears('ps-yr',y);fillDays('pe-day',31);fillYears('pe-yr',y);
  setDate('ps-day','ps-mon','ps-yr',d.period.start);
  setDate('pe-day','pe-mon','pe-yr',d.period.end);
  // Fill cfg
  if(d.limit)document.getElementById('cfg-lim').value=d.limit;
  document.getElementById('cfg-pct').value=d.alertPct||80;
  render();
  // Daily toast
  const last=localStorage.getItem('gd_daily'),td=today();
  if(last!==td){
    localStorage.setItem('gd_daily',td);
    const p=d.period,es=pEntries(d.entries,p),g=es.reduce((s,e)=>s+(+(e.amt||0)),0),pct=d.limit>0?g/d.limit*100:0;
    setTimeout(()=>{
      if(g>d.limit)toast('🚨',`Limite excedido! ${fmt(g)} de ${fmt(d.limit)}`);
      else if(pct>=(d.alertPct||80))toast('⚠️',`${pct.toFixed(0)}% do limite atingido!`);
    },800);
  }
});
</script>
</body>
</html>
