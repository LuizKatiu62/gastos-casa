<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treinos · Luiz Silva</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8;--card:#fff;--border:#e2e8f0;
  --blue:#1a56db;--green:#0e9f6e;--red:#ef4444;
  --purple:#7c3aed;--orange:#f97316;
  --text:#1e293b;--muted:#64748b;--r:14px;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;padding-bottom:40px;
}

/* ── HEADER ── */
.header{
  background:linear-gradient(135deg,#1a56db,#0e9f6e);
  color:#fff;padding:1.4rem 1rem 1.2rem;
  display:flex;align-items:center;justify-content:space-between;gap:.5rem;
}
.htext h1{font-size:1.05rem;font-weight:900}
.htext p{font-size:.7rem;opacity:.75;margin-top:2px}
.btn-sync{
  background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);
  border-radius:20px;padding:.35rem .85rem;
  font-size:.72rem;font-weight:700;color:#fff;
  cursor:pointer;white-space:nowrap;font-family:inherit;
  transition:background .2s;
}
.btn-sync:hover{background:rgba(255,255,255,.3)}

/* ── WRAP ── */
.wrap{max-width:700px;margin:0 auto;padding:1rem}

/* ── LOADING ── */
.loading{text-align:center;padding:3rem 1rem;color:var(--muted)}
.spin{
  width:36px;height:36px;border:3px solid #e2e8f0;
  border-top-color:var(--blue);border-radius:50%;
  animation:spin .7s linear infinite;margin:0 auto 1rem;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── CARD ── */
.card{
  background:var(--card);border-radius:var(--r);
  border:1px solid var(--border);padding:1rem;margin-bottom:.75rem;
}
.card-title{
  font-size:.72rem;font-weight:800;text-transform:uppercase;
  letter-spacing:1px;color:var(--muted);margin-bottom:.85rem;
  display:flex;align-items:center;gap:.4rem;
}

/* ── STATS HERO ── */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.55rem;margin-bottom:.75rem}
.stat{
  background:var(--card);border-radius:var(--r);border:1px solid var(--border);
  padding:.85rem .6rem;text-align:center;
}
.stat-v{font-size:1.45rem;font-weight:900;line-height:1}
.stat-l{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:3px}
.stats-grid2{display:grid;grid-template-columns:1fr 1fr;gap:.55rem;margin-bottom:.75rem}

/* ── CHART ── */
.chart-h{position:relative;height:175px}
.chart-sm{position:relative;height:130px}

/* ── RUN CARDS ── */
.run-list{display:flex;flex-direction:column;gap:.45rem}
.run{
  background:#f8fafc;border:1px solid var(--border);border-radius:10px;
  padding:.7rem .85rem;display:flex;align-items:center;gap:.7rem;
}
.run-ico{
  width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--green));
  display:flex;align-items:center;justify-content:center;
  font-size:.95rem;flex-shrink:0;
}
.run-info{flex:1;min-width:0}
.run-name{font-size:.83rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.run-meta{font-size:.7rem;color:var(--muted);margin-top:2px}
.run-right{text-align:right;flex-shrink:0}
.run-km{font-size:1rem;font-weight:900;color:var(--blue)}
.run-pace{font-size:.68rem;color:var(--muted)}

/* ── BADGES ── */
.badge{
  display:inline-block;border-radius:20px;padding:1px 7px;
  font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-left:4px;
}
.b-facil{background:#ecfdf5;color:#065f46}
.b-trilha{background:#fff7ed;color:#9a3412}
.b-intervalado{background:#eff6ff;color:#1e40af}
.b-esteira{background:#f5f3ff;color:#4c1d95}
.b-caminhada{background:#fefce8;color:#713f12}
.b-virtual{background:#f1f5f9;color:#334155}

/* ── HEALTH GRID ── */
.hgrid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem}

/* ── EMPTY STATE ── */
.empty{
  text-align:center;padding:2rem;background:var(--card);
  border-radius:var(--r);border:1px solid var(--border);
}
.empty h3{margin-bottom:.5rem}
.empty p{font-size:.85rem;color:var(--muted);line-height:1.7}
.empty code{background:#f1f5f9;border-radius:6px;padding:2px 6px;font-size:.78rem}

@media(max-width:380px){
  .stats-grid{grid-template-columns:repeat(3,1fr)}
  .stat-v{font-size:1.15rem}
  .hgrid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="header">
  <div class="htext">
    <h1>🏃 Treinos · Luiz Silva</h1>
    <p id="hSub">Carregando…</p>
  </div>
  <button class="btn-sync" onclick="loadData()">↻ Atualizar</button>
</div>

<div class="wrap">
  <div id="loading" class="loading">
    <div class="spin"></div>
    Carregando seus treinos do Garmin…
  </div>
  <div id="dash" style="display:none"></div>
</div>

<script>
const FB_DB   = 'https://gastos-casa-7f431-default-rtdb.firebaseio.com';
const FB_KEY  = 'AIzaSyB0hO4m0XPRqmrYegHtkV4KawJA2py1glU';
const FB_PATH = 'treinos/luiz';

let charts = {};

async function fbToken(){
  const r = await fetch(
    `https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${FB_KEY}`,
    {method:'POST',headers:{'Content-Type':'application/json'},
     body:JSON.stringify({returnSecureToken:true})}
  );
  return (await r.json()).idToken || '';
}

async function loadData(){
  document.getElementById('loading').style.display = 'block';
  document.getElementById('dash').style.display    = 'none';
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
  try {
    const token = await fbToken();
    const res   = await fetch(`${FB_DB}/${FB_PATH}.json?auth=${token}`);
    const d     = await res.json();
    if(!d || !d.atividades || !d.atividades.length){ showEmpty(); return; }
    render(d);
  } catch(e){ showEmpty(true); }
}

function showEmpty(err){
  document.getElementById('loading').style.display = 'none';
  document.getElementById('hSub').textContent = err ? 'Erro ao carregar' : 'Sem dados';
  document.getElementById('dash').style.display = 'block';
  document.getElementById('dash').innerHTML = `
    <div class="empty">
      <div style="font-size:3rem;margin-bottom:.75rem">🏃</div>
      <h3>Nenhum dado ainda</h3>
      <p>Rode o script no Terminal para sincronizar seus treinos do Garmin:<br><br>
      <code>cd ~/gastos-casa && python3 sync-garmin.py</code><br><br>
      Depois clique em <strong>↻ Atualizar</strong> acima.</p>
    </div>`;
}

// ── HELPERS ──
const TIPO_ICO   = {facil:'🏃',trilha:'⛰️',intervalado:'⚡',esteira:'🏃',caminhada:'🚶',virtual:'💻'};
const TIPO_LABEL = {facil:'Fácil',trilha:'Trilha',intervalado:'Intervalo',esteira:'Esteira',caminhada:'Caminhada',virtual:'Virtual'};
const MESES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const DIAS  = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

function fmtData(d){ if(!d) return ''; const[y,m,dia]=d.split('-'); return `${+dia} ${MESES[+m-1]}`; }
function fmtDow(d) { if(!d) return ''; return DIAS[new Date(d+'T12:00:00').getDay()]; }
function fmtSync(s){ if(!s) return ''; const d=new Date(s);
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)} às ${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function pad(n){ return String(n).padStart(2,'0'); }
function semLabel(s){ const[,w]=s.split('-W'); return `S${w}`; }

function p2s(p){ if(!p) return 0; const[m,s]=p.split(':').map(Number); return m*60+(s||0); }
function s2p(s){ const m=Math.floor(s/60),sec=Math.round(s%60); return `${m}:${pad(sec)}`; }

const BASE_OPTS = {
  responsive:true, maintainAspectRatio:false,
  plugins:{legend:{display:false}},
  scales:{
    x:{grid:{display:false}, ticks:{font:{size:9},maxRotation:0}},
    y:{grid:{color:'#f1f5f9'}, ticks:{font:{size:9}}}
  }
};

// ── RENDER ──
function render(d){
  const ativ   = (d.atividades||[]).sort((a,b)=>b.data.localeCompare(a.data));
  const meta   = d.meta || {};
  const sem    = d.semanal || {};
  const bb     = d.bodyBattery || {};
  const sono   = d.sono || {};

  document.getElementById('hSub').textContent =
    meta.ultimaSync ? 'Sincronizado: ' + fmtSync(meta.ultimaSync) : 'Dados do Garmin Connect';

  // ── Métricas ──
  const comPace   = ativ.filter(a=>a.pace && a.distancia>=1);
  const melhorPace = comPace.length ? s2p(Math.min(...comPace.map(a=>p2s(a.pace)))) : '—';
  const comFC     = ativ.filter(a=>a.fcMed>0);
  const mediaFC   = comFC.length ? Math.round(comFC.reduce((s,a)=>s+a.fcMed,0)/comFC.length) : 0;

  // ── Stats hero ──
  const statsHtml = `
    <div class="stats-grid">
      <div class="stat"><div class="stat-v" style="color:var(--blue)">${meta.km30dias??'—'}</div><div class="stat-l">km / mês</div></div>
      <div class="stat"><div class="stat-v" style="color:var(--green)">${meta.treinos30dias??'—'}</div><div class="stat-l">treinos / mês</div></div>
      <div class="stat"><div class="stat-v" style="color:var(--orange)">${melhorPace}</div><div class="stat-l">melhor pace</div></div>
    </div>
    <div class="stats-grid2">
      <div class="stat"><div class="stat-v" style="color:var(--muted);font-size:1.2rem">${meta.totalKm??'—'} km</div><div class="stat-l">total (${meta.totalTreinos??0} treinos)</div></div>
      <div class="stat"><div class="stat-v" style="color:var(--red)">${mediaFC||'—'}</div><div class="stat-l">FC média</div></div>
    </div>`;

  // ── Volume semanal ──
  const semKeys = Object.keys(sem).sort().slice(-10);
  const volHtml = semKeys.length ? `
    <div class="card">
      <div class="card-title">📊 Volume Semanal (km)</div>
      <div class="chart-h"><canvas id="cVol"></canvas></div>
    </div>` : '';

  // ── Últimos treinos ──
  const ultimos = ativ.slice(0,15);
  const treHtml = `
    <div class="card">
      <div class="card-title">🏃 Últimos Treinos</div>
      <div class="run-list">
        ${ultimos.map(a=>`
          <div class="run">
            <div class="run-ico">${TIPO_ICO[a.tipo]||'🏃'}</div>
            <div class="run-info">
              <div class="run-name">${fmtDow(a.data)}, ${fmtData(a.data)}<span class="badge b-${a.tipo||'facil'}">${TIPO_LABEL[a.tipo]||'Corrida'}</span></div>
              <div class="run-meta">${a.duracao||''}${a.fcMed?' · ❤️ '+a.fcMed:''}${a.calorias?' · 🔥 '+a.calorias+' kcal':''}</div>
            </div>
            <div class="run-right">
              <div class="run-km">${a.distancia} km</div>
              <div class="run-pace">${a.pace?a.pace+' /km':''}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;

  // ── Pace evolution ──
  const paceActs = comPace.slice(0,20).reverse();
  const paceHtml = paceActs.length>=2 ? `
    <div class="card">
      <div class="card-title">📈 Evolução do Pace (últimos 20 treinos)</div>
      <div class="chart-h"><canvas id="cPace"></canvas></div>
    </div>` : '';

  // ── FC evolution ──
  const fcActs = comFC.slice(0,20).reverse();
  const fcHtml = fcActs.length>=2 ? `
    <div class="card">
      <div class="card-title">❤️ Frequência Cardíaca Média</div>
      <div class="chart-h"><canvas id="cFC"></canvas></div>
    </div>` : '';

  // ── Body Battery ──
  const bbKeys = Object.keys(bb).sort().slice(-14);
  const bbCard = bbKeys.length ? `
    <div class="card">
      <div class="card-title">🔋 Body Battery (máx diário)</div>
      <div class="chart-sm"><canvas id="cBB"></canvas></div>
    </div>` : '';

  // ── Sono ──
  const sonoKeys = Object.keys(sono).sort().slice(-14);
  const sonoCard = sonoKeys.length ? `
    <div class="card">
      <div class="card-title">😴 Sono (horas por noite)</div>
      <div class="chart-sm"><canvas id="cSono"></canvas></div>
    </div>` : '';

  const healthHtml = (bbCard || sonoCard) ? `<div class="hgrid">${bbCard}${sonoCard}</div>` : '';

  document.getElementById('loading').style.display = 'none';
  document.getElementById('dash').style.display    = 'block';
  document.getElementById('dash').innerHTML =
    statsHtml + volHtml + treHtml + paceHtml + fcHtml + healthHtml;

  // ── Chart: Volume ──
  if(semKeys.length){
    charts.vol = new Chart(document.getElementById('cVol'),{
      type:'bar',
      data:{
        labels: semKeys.map(semLabel),
        datasets:[{
          data: semKeys.map(k=>sem[k].km),
          backgroundColor: semKeys.map((_,i)=>i===semKeys.length-1?'#1a56db':'rgba(26,86,219,.28)'),
          borderRadius:5,
        }]
      },
      options:{...BASE_OPTS,
        plugins:{...BASE_OPTS.plugins, tooltip:{callbacks:{label:c=>c.raw+' km'}}}}
    });
  }

  // ── Chart: Pace ──
  if(paceActs.length>=2){
    charts.pace = new Chart(document.getElementById('cPace'),{
      type:'line',
      data:{
        labels: paceActs.map(a=>fmtData(a.data)),
        datasets:[{
          data: paceActs.map(a=>p2s(a.pace)),
          borderColor:'#0e9f6e', backgroundColor:'rgba(14,159,110,.1)',
          borderWidth:2, pointRadius:4, pointBackgroundColor:'#0e9f6e',
          tension:.35, fill:true,
        }]
      },
      options:{...BASE_OPTS,
        plugins:{...BASE_OPTS.plugins, tooltip:{callbacks:{label:c=>'Pace: '+s2p(c.raw)+' /km'}}},
        scales:{
          x:{...BASE_OPTS.scales.x},
          y:{...BASE_OPTS.scales.y, reverse:true, ticks:{...BASE_OPTS.scales.y.ticks, callback:v=>s2p(v)}}
        }
      }
    });
  }

  // ── Chart: FC ──
  if(fcActs.length>=2){
    charts.fc = new Chart(document.getElementById('cFC'),{
      type:'line',
      data:{
        labels: fcActs.map(a=>fmtData(a.data)),
        datasets:[{
          data: fcActs.map(a=>a.fcMed),
          borderColor:'#ef4444', backgroundColor:'rgba(239,68,68,.08)',
          borderWidth:2, pointRadius:4, pointBackgroundColor:'#ef4444',
          tension:.35, fill:true,
        }]
      },
      options:{...BASE_OPTS,
        plugins:{...BASE_OPTS.plugins, tooltip:{callbacks:{label:c=>c.raw+' bpm'}}}}
    });
  }

  // ── Chart: Body Battery ──
  if(bbKeys.length && document.getElementById('cBB')){
    charts.bb = new Chart(document.getElementById('cBB'),{
      type:'line',
      data:{
        labels: bbKeys.map(fmtData),
        datasets:[{
          data: bbKeys.map(k=>bb[k].max),
          borderColor:'#f97316', backgroundColor:'rgba(249,115,22,.12)',
          borderWidth:2, pointRadius:3, tension:.35, fill:true,
        }]
      },
      options:{...BASE_OPTS,
        scales:{x:{...BASE_OPTS.scales.x}, y:{...BASE_OPTS.scales.y, min:0, max:100,
          ticks:{...BASE_OPTS.scales.y.ticks, callback:v=>v+'%'}}}}
    });
  }

  // ── Chart: Sono ──
  if(sonoKeys.length && document.getElementById('cSono')){
    charts.sono = new Chart(document.getElementById('cSono'),{
      type:'bar',
      data:{
        labels: sonoKeys.map(fmtData),
        datasets:[{
          data: sonoKeys.map(k=>sono[k].duracao),
          backgroundColor:'rgba(124,58,237,.4)',
          borderColor:'#7c3aed', borderWidth:1, borderRadius:4,
        }]
      },
      options:{...BASE_OPTS,
        plugins:{...BASE_OPTS.plugins, tooltip:{callbacks:{label:c=>c.raw+'h'}}},
        scales:{x:{...BASE_OPTS.scales.x}, y:{...BASE_OPTS.scales.y, min:0, max:10,
          ticks:{...BASE_OPTS.scales.y.ticks, callback:v=>v+'h'}}}}
    });
  }
}

loadData();
</script>
</body>
</html>
