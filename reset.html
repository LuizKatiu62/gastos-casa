<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Atualizando…</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:linear-gradient(135deg,#064e3b,#059669);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#fff;text-align:center;padding:24px}
.box{max-width:300px}
.icon{font-size:56px;display:block;margin-bottom:20px;animation:spin 1.2s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
h2{font-size:18px;font-weight:800;margin-bottom:8px}
p{font-size:13px;opacity:.8;line-height:1.5}
.safe{margin-top:14px;font-size:12px;background:rgba(255,255,255,.12);border-radius:10px;padding:8px 12px;opacity:.9}
</style>
</head>
<body>
<div class="box">
  <span class="icon">🔄</span>
  <h2>Atualizando o app…</h2>
  <p>Aguarde um momento.</p>
  <div class="safe">🔒 Seus dados estão seguros.<br>Só os arquivos do app são atualizados.</div>
</div>
<script>
(function(){
  var nav=function(){
    window.location.replace('./travel.html?_r='+Date.now());
  };
  if(!('serviceWorker' in navigator)){ nav(); return; }
  navigator.serviceWorker.getRegistrations()
    .then(function(regs){
      return Promise.all(regs.map(function(r){ return r.unregister(); }));
    })
    .then(function(){
      if(!('caches' in window)) return;
      return caches.keys().then(function(keys){
        return Promise.all(keys.map(function(k){ return caches.delete(k); }));
      });
    })
    .then(nav)
    .catch(nav);
})();
</script>
</body>
</html>
